services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: warehouse-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: warehouse
      CLICKHOUSE_USER: warehouse
      CLICKHOUSE_PASSWORD: warehouse_pass
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  etl:
    build: ./etl
    container_name: warehouse-etl
    depends_on:
      - clickhouse
    env_file:
      - .env
    volumes:
      - ./etl/src:/app/src
      # SSH key montada a partir do Windows (exemplo)
      # Ajuste o caminho do seu id_rsa aqui:
      - /c/Users/guibo/.ssh/id_rsa:/keys/id_rsa:ro
    command: bash -lc "sleep infinity"

volumes:
  clickhouse_data:
